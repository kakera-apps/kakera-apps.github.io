<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コイントス</title>
<!-- AdSense: <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXX" crossorigin="anonymous"></script> -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #0f0f0f;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: 20px;
    text-align: center;
  }
  .back {
    position: fixed;
    top: 16px;
    left: 16px;
    font-size: 0.85rem;
    color: #666;
    text-decoration: none;
  }
  .back:hover { color: #aaa; }
  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .sub {
    font-size: 0.85rem;
    opacity: 0.4;
    letter-spacing: 0.1em;
    margin-bottom: 44px;
  }

  /* ---- Coin ---- */
  .coin-scene {
    width: 160px;
    height: 160px;
    perspective: 600px;
    margin-bottom: 32px;
    cursor: pointer;
  }
  .coin {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.05s;
    border-radius: 50%;
  }
  .coin.spinning {
    animation: coinSpin 0.8s ease-in-out;
  }
  @keyframes coinSpin {
    0%   { transform: rotateY(0deg); }
    40%  { transform: rotateY(900deg) rotateX(30deg); }
    70%  { transform: rotateY(1440deg) rotateX(10deg); }
    100% { transform: rotateY(var(--final-rot, 1800deg)); }
  }
  .coin-face {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    border: 6px solid;
    flex-direction: column;
    gap: 4px;
  }
  .coin-heads {
    background: radial-gradient(circle at 35% 35%, #ffe082, #f9a825);
    border-color: #f57f17;
    color: #5d4037;
    transform: rotateY(0deg);
  }
  .coin-tails {
    background: radial-gradient(circle at 35% 35%, #b0bec5, #607d8b);
    border-color: #37474f;
    color: #263238;
    transform: rotateY(180deg);
  }
  .coin-face .face-label {
    font-size: 1rem;
    letter-spacing: 0.15em;
  }
  .coin-face .face-symbol {
    font-size: 2.4rem;
    line-height: 1;
  }

  .result-text {
    font-size: 2rem;
    font-weight: 900;
    min-height: 48px;
    letter-spacing: 0.05em;
  }
  .result-text.heads { color: #ffd700; }
  .result-text.tails { color: #90caf9; }

  .streak {
    font-size: 1rem;
    opacity: 0.6;
    margin-top: 10px;
    min-height: 28px;
  }
  .tap-hint {
    font-size: 0.85rem;
    opacity: 0.35;
    margin-top: 8px;
  }

  .stats {
    display: flex;
    gap: 28px;
    margin-top: 36px;
    padding: 16px 28px;
    background: #1a1a1a;
    border-radius: 16px;
    border: 1px solid #2a2a2a;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-size: 1.8rem;
    font-weight: 900;
  }
  .stat-label {
    font-size: 0.7rem;
    opacity: 0.4;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
  .stat-item.h-col .stat-num { color: #ffd700; }
  .stat-item.t-col .stat-num { color: #90caf9; }
  .reset-btn {
    margin-top: 14px;
    background: none;
    border: 1px solid #333;
    color: #555;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .reset-btn:hover { color: #888; border-color: #555; }
  .ad { margin-top: 40px; min-height: 50px; width: 320px; }
</style>
</head>
<body>

<a class="back" href="../index.html">← 戻る</a>

<h1>コイントス</h1>
<div class="sub">COIN TOSS</div>

<div class="coin-scene" id="coin-scene">
  <div class="coin" id="coin">
    <div class="coin-face coin-heads">
      <span class="face-symbol">☀️</span>
      <span class="face-label">HEADS</span>
    </div>
    <div class="coin-face coin-tails">
      <span class="face-symbol">🌙</span>
      <span class="face-label">TAILS</span>
    </div>
  </div>
</div>

<div class="result-text" id="result-text">コインをタップ</div>
<div class="streak" id="streak"></div>
<div class="tap-hint" id="tap-hint">タップしてコインを投げよう</div>

<div class="stats">
  <div class="stat-item h-col">
    <div class="stat-num" id="heads-count">0</div>
    <div class="stat-label">HEADS</div>
  </div>
  <div class="stat-item t-col">
    <div class="stat-num" id="tails-count">0</div>
    <div class="stat-label">TAILS</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="total-count">0</div>
    <div class="stat-label">TOTAL</div>
  </div>
</div>
<button class="reset-btn" id="reset-btn">リセット</button>

<div class="ad">
  <!-- <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXX" data-ad-slot="XXXXXXXX" data-ad-format="auto"></ins> -->
</div>

<script>
  const coinEl    = document.getElementById('coin');
  const scene     = document.getElementById('coin-scene');
  const resultEl  = document.getElementById('result-text');
  const streakEl  = document.getElementById('streak');
  const tapHint   = document.getElementById('tap-hint');
  const headsEl   = document.getElementById('heads-count');
  const tailsEl   = document.getElementById('tails-count');
  const totalEl   = document.getElementById('total-count');

  let flipping = false;
  let data = JSON.parse(localStorage.getItem('coin-data') || '{"heads":0,"tails":0,"streak":0,"lastSide":""}');

  function save() { localStorage.setItem('coin-data', JSON.stringify(data)); }
  function renderStats() {
    headsEl.textContent = data.heads;
    tailsEl.textContent = data.tails;
    totalEl.textContent = data.heads + data.tails;
  }
  renderStats();

  if (data.lastSide) {
    // 前回の結果を表示
    const isHeads = data.lastSide === 'heads';
    coinEl.style.transform = isHeads ? 'rotateY(0deg)' : 'rotateY(180deg)';
    resultEl.className = 'result-text ' + data.lastSide;
    resultEl.textContent = isHeads ? '🌕 HEADS' : '🌑 TAILS';
    if (data.streak >= 2) {
      const side = data.lastSide === 'heads' ? 'HEADS' : 'TAILS';
      streakEl.textContent = `${side} ${data.streak}連続！`;
    }
    tapHint.textContent = 'タップでもう一度';
  }

  scene.addEventListener('click', () => {
    if (flipping) return;
    flipping = true;
    tapHint.textContent = '';

    const isHeads = Math.random() < 0.5;
    const side = isHeads ? 'heads' : 'tails';

    // アニメーション: 表=0deg, 裏=180deg
    const finalRot = isHeads ? 1800 : 1980; // 1800=表(0mod360), 1980=裏(180mod360)
    coinEl.style.setProperty('--final-rot', finalRot + 'deg');
    coinEl.classList.remove('spinning');
    void coinEl.offsetWidth;
    coinEl.classList.add('spinning');

    setTimeout(() => {
      coinEl.classList.remove('spinning');
      coinEl.style.transform = isHeads ? 'rotateY(0deg)' : 'rotateY(180deg)';

      if (side === data.lastSide) {
        data.streak++;
      } else {
        data.streak = 1;
      }
      data.lastSide = side;
      if (isHeads) data.heads++; else data.tails++;
      save();
      renderStats();

      resultEl.className = 'result-text ' + side;
      resultEl.textContent = isHeads ? '🌕 HEADS' : '🌑 TAILS';

      if (data.streak >= 2) {
        const label = isHeads ? 'HEADS' : 'TAILS';
        streakEl.textContent = `${label} ${data.streak}連続！`;
      } else {
        streakEl.textContent = '';
      }
      tapHint.textContent = 'タップでもう一度';
      flipping = false;
    }, 820);
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    if (confirm('通算記録をリセットしますか？')) {
      data = { heads: 0, tails: 0, streak: 0, lastSide: '' };
      save();
      renderStats();
      resultEl.textContent = 'コインをタップ';
      resultEl.className = 'result-text';
      streakEl.textContent = '';
      tapHint.textContent = 'タップしてコインを投げよう';
      coinEl.style.transform = 'rotateY(0deg)';
    }
  });
</script>
</body>
</html>
