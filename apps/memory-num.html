<title>数字記憶</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: 20px;
  }
  #back-btn {
    position: fixed; top: 12px; left: 12px;
    color: rgba(255,255,255,0.4); text-decoration: none;
    font-size: 0.85rem; z-index: 100; padding: 6px 10px;
  }
  #back-btn:hover { color: #fff; }

  /* IDLE */
  #state-idle { display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
  #state-idle h1 { font-size: 1.8rem; font-weight: 900; }
  #state-idle p { font-size: 0.9rem; opacity: 0.5; line-height: 1.6; max-width: 280px; }
  .best-label { font-size: 0.8rem; opacity: 0.35; }
  .start-btn {
    background: #fff; color: #000; border: none; border-radius: 99px;
    padding: 16px 48px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 8px;
  }
  .start-btn:active { transform: scale(0.96); }

  /* SHOW phase */
  #state-show { display: none; flex-direction: column; align-items: center; gap: 24px; }
  #digits-label { font-size: 0.9rem; opacity: 0.5; }
  #number-display {
    font-size: clamp(2.8rem, 14vw, 5.5rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    line-height: 1;
    text-align: center;
    color: #ffd700;
    max-width: 320px;
    word-break: break-all;
  }
  #countdown-bar-wrap {
    width: 240px; height: 6px;
    background: #2a2a2a; border-radius: 99px; overflow: hidden;
  }
  #countdown-bar {
    height: 100%; background: #ffd700; border-radius: 99px; width: 100%;
    transition: width 1.5s linear;
  }

  /* INPUT phase */
  #state-input { display: none; flex-direction: column; align-items: center; gap: 16px; }
  #input-prompt { font-size: 0.9rem; opacity: 0.5; }
  #input-display {
    font-size: clamp(2.5rem, 12vw, 5rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    min-height: 1.3em;
    border-bottom: 3px solid #4fc3f7;
    min-width: 200px;
    text-align: center;
    padding-bottom: 4px;
    color: #4fc3f7;
  }
  #input-display.wrong { color: #ff4d4d; border-color: #ff4d4d; animation: shake 0.35s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  #numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: min(300px, 90vw);
  }
  .num-key {
    background: #1a1a1a; border: 1px solid #2a2a2a; color: #fff;
    border-radius: 12px; padding: 18px 0; font-size: 1.4rem; font-weight: 700;
    cursor: pointer; transition: background 0.1s, transform 0.1s;
  }
  .num-key:active { background: #333; transform: scale(0.94); }
  .num-key.del-key { font-size: 1.1rem; background: #1d1d1d; color: #ff6b6b; }
  .num-key.zero-key { grid-column: 2; }

  /* RESULT */
  #state-result { display: none; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
  #result-digits { font-size: clamp(4rem, 22vw, 8rem); font-weight: 900; line-height: 1; color: #4fc3f7; }
  #result-best { font-size: 0.85rem; opacity: 0.35; }

  .share-btn {
    background: #1d9bf0; color: #fff; border: none; border-radius: 99px;
    padding: 14px 40px; font-size: 1rem; font-weight: 700; cursor: pointer;
    margin-top: 12px; letter-spacing: 0.05em;
    box-shadow: 0 4px 20px rgba(29,155,240,0.4);
  }
  .share-btn:active { opacity: 0.8; transform: scale(0.96); }
  .x-btn { background: #000; color: #fff; border: none; border-radius: 99px; padding: 14px 28px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .x-btn:active { opacity: 0.7; transform: scale(0.96); }
  .retry-btn {
    background: #222; color: #fff; border: none; border-radius: 99px;
    padding: 12px 36px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
  }
  .retry-btn:active { transform: scale(0.96); }

  @keyframes popIn {
    0%   { transform: scale(0.4); opacity: 0; }
    70%  { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop-in { animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
</style>
</head>
<body>

<a href="../index.html" id="back-btn">← 戻る</a>

<div id="state-idle">
  <h1>🔢 数字記憶</h1>
  <p>数字が1.5秒表示されます。<br>消えたらテンキーで入力。<br>何桁まで覚えられる？</p>
  <p class="best-label" id="idle-best"></p>
  <button class="start-btn" onclick="startGame()">スタート</button>
</div>

<div id="state-show">
  <div id="digits-label">この数字を覚えて！</div>
  <div id="number-display"></div>
  <div id="countdown-bar-wrap"><div id="countdown-bar"></div></div>
</div>

<div id="state-input">
  <div id="input-prompt">入力してください</div>
  <div id="input-display">_</div>
  <div id="numpad">
    <button class="num-key" onclick="numPress('1')">1</button>
    <button class="num-key" onclick="numPress('2')">2</button>
    <button class="num-key" onclick="numPress('3')">3</button>
    <button class="num-key" onclick="numPress('4')">4</button>
    <button class="num-key" onclick="numPress('5')">5</button>
    <button class="num-key" onclick="numPress('6')">6</button>
    <button class="num-key" onclick="numPress('7')">7</button>
    <button class="num-key" onclick="numPress('8')">8</button>
    <button class="num-key" onclick="numPress('9')">9</button>
    <button class="num-key del-key" onclick="numDel()">← 削除</button>
    <button class="num-key zero-key" onclick="numPress('0')">0</button>
  </div>
</div>

<div id="state-result">
  <div style="font-size:1rem;opacity:0.5;margin-bottom:4px;">記憶できた桁数</div>
  <div id="result-digits">0</div>
  <div style="font-size:1rem;opacity:0.5;">桁</div>
  <div id="result-best"></div>
  <button class="share-btn" onclick="doShare()">シェアする 🔗</button>
  <button class="x-btn" onclick="xShare()">X でシェア</button>
  <button class="retry-btn" onclick="showIdle()" style="margin-top:8px;">もう一度</button>
</div>

<script>
let currentDigits = 3;
let targetNumber = '';
let inputValue = '';
let showTimer = null;

function showIdle() {
  document.getElementById('state-idle').style.display = 'flex';
  document.getElementById('state-show').style.display = 'none';
  document.getElementById('state-input').style.display = 'none';
  document.getElementById('state-result').style.display = 'none';
  const best = parseInt(localStorage.getItem('memnum-best') || '0');
  document.getElementById('idle-best').textContent = best ? `自己ベスト: ${best}桁` : '';
}

function startGame() {
  currentDigits = 3;
  document.getElementById('state-idle').style.display = 'none';
  showNumber();
}

function generateNumber(digits) {
  let num = '';
  // first digit non-zero
  num += (1 + Math.floor(Math.random() * 9)).toString();
  for (let i = 1; i < digits; i++) {
    num += Math.floor(Math.random() * 10).toString();
  }
  return num;
}

function showNumber() {
  targetNumber = generateNumber(currentDigits);
  inputValue = '';

  document.getElementById('state-show').style.display = 'flex';
  document.getElementById('state-input').style.display = 'none';
  document.getElementById('state-result').style.display = 'none';

  const numEl = document.getElementById('number-display');
  const d = currentDigits;
  numEl.style.fontSize = d <= 6 ? '5rem' : d <= 9 ? '3.8rem' : d <= 12 ? '2.8rem' : d <= 16 ? '2rem' : '1.4rem';
  numEl.textContent = targetNumber;
  document.getElementById('digits-label').textContent = `${currentDigits}桁の数字を覚えて！`;

  // Reset and animate bar
  const bar = document.getElementById('countdown-bar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  void bar.offsetWidth;
  bar.style.transition = 'width 1.5s linear';
  bar.style.width = '0%';

  if (showTimer) clearTimeout(showTimer);
  showTimer = setTimeout(showInput, 1500);
}

function showInput() {
  document.getElementById('state-show').style.display = 'none';
  document.getElementById('state-input').style.display = 'flex';
  document.getElementById('input-display').textContent = '_';
  document.getElementById('input-display').classList.remove('wrong');
}

function updateInputDisplay() {
  const el = document.getElementById('input-display');
  el.textContent = inputValue || '_';
}

function numPress(d) {
  if (inputValue.length >= currentDigits) return;
  inputValue += d;
  updateInputDisplay();
  if (inputValue.length === currentDigits) {
    checkAnswer();
  }
}

function numDel() {
  if (inputValue.length === 0) return;
  inputValue = inputValue.slice(0, -1);
  updateInputDisplay();
}

function checkAnswer() {
  if (inputValue === targetNumber) {
    // correct
    currentDigits++;
    setTimeout(showNumber, 600);
  } else {
    // wrong
    const el = document.getElementById('input-display');
    el.classList.remove('wrong');
    void el.offsetWidth;
    el.classList.add('wrong');
    setTimeout(showResult, 800);
  }
}

function showResult() {
  const achieved = currentDigits - 1; // last successfully remembered
  document.getElementById('state-input').style.display = 'none';
  document.getElementById('state-result').style.display = 'flex';

  const digEl = document.getElementById('result-digits');
  digEl.textContent = achieved;

  const best = parseInt(localStorage.getItem('memnum-best') || '0');
  if (achieved > best) {
    localStorage.setItem('memnum-best', achieved);
    document.getElementById('result-best').textContent = '🎉 新記録！';
  } else {
    document.getElementById('result-best').textContent = `自己ベスト: ${best}桁`;
  }

  digEl.classList.remove('pop-in');
  void digEl.offsetWidth;
  digEl.classList.add('pop-in');
}

function showToast(m) {
  const t = document.createElement('div');
  t.textContent = m;
  Object.assign(t.style, {
    position:'fixed', bottom:'80px', left:'50%', transform:'translateX(-50%)',
    background:'#fff', color:'#000', padding:'10px 20px', borderRadius:'99px',
    fontSize:'0.9rem', fontWeight:'700', zIndex:'999', pointerEvents:'none', whiteSpace:'nowrap'
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function doShare() {
  const digits = document.getElementById('result-digits').textContent;
  const text = `数字記憶 ${digits}桁まで記憶！\nあなたは？ → kakera-apps.github.io/apps/memory-num.html\n#数字記憶 #kakera_app #暇つぶし`;
  if (navigator.share) { navigator.share({ text }); }
  else { navigator.clipboard.writeText(text).then(() => showToast('コピーしました！')); }
}

showIdle();
function xShare(){const digits=document.getElementById('result-digits').textContent;window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(`数字記憶 ${digits}桁まで記憶！\nあなたは？ → kakera-apps.github.io/apps/memory-num.html\n#数字記憶 #kakera_app #暇つぶし`),'_blank');}
</script>
</body>
</html>
