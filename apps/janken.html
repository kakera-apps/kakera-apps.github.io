<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>じゃんけん</title>
<!-- AdSense: <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXX" crossorigin="anonymous"></script> -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #0f0f0f;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: 20px;
  }
  .back {
    position: fixed;
    top: 16px;
    left: 16px;
    font-size: 0.85rem;
    color: #666;
    text-decoration: none;
  }
  .back:hover { color: #aaa; }
  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .sub {
    font-size: 0.85rem;
    opacity: 0.4;
    letter-spacing: 0.1em;
    margin-bottom: 36px;
  }
  .battle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 28px;
    min-height: 100px;
  }
  .hand {
    font-size: 4.5rem;
    line-height: 1;
    transition: transform 0.15s;
  }
  .hand.shake { animation: shake 0.35s ease; }
  @keyframes shake {
    0%,100% { transform: translateY(0); }
    25%      { transform: translateY(-12px); }
    75%      { transform: translateY(8px); }
  }
  .vs {
    font-size: 1.1rem;
    opacity: 0.3;
    font-weight: 700;
  }
  .result-text {
    font-size: 2.2rem;
    font-weight: 900;
    min-height: 60px;
    letter-spacing: 0.05em;
    text-align: center;
  }
  .result-text.win  { color: #00dc64; }
  .result-text.lose { color: #ff4d4d; }
  .result-text.draw { color: #ffd700; }
  .buttons {
    display: flex;
    gap: 20px;
    margin-top: 32px;
  }
  .btn {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #1e1e1e;
    border: 2px solid #333;
    font-size: 2.6rem;
    cursor: pointer;
    transition: transform 0.1s, background 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn:active { transform: scale(0.88); background: #2a2a2a; }
  .score {
    display: flex;
    gap: 28px;
    margin-top: 36px;
    padding: 16px 28px;
    background: #1a1a1a;
    border-radius: 16px;
    border: 1px solid #2a2a2a;
  }
  .score-item {
    text-align: center;
  }
  .score-num {
    font-size: 1.8rem;
    font-weight: 900;
  }
  .score-label {
    font-size: 0.7rem;
    opacity: 0.4;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
  .score-item.win-col  .score-num { color: #00dc64; }
  .score-item.lose-col .score-num { color: #ff4d4d; }
  .score-item.draw-col .score-num { color: #ffd700; }
  .reset-btn {
    margin-top: 16px;
    background: none;
    border: 1px solid #333;
    color: #555;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .reset-btn:hover { color: #888; border-color: #555; }
  .ad { margin-top: 40px; min-height: 50px; width: 320px; }
</style>
</head>
<body>

<a class="back" href="../index.html">← 戻る</a>

<h1>じゃんけん</h1>
<div class="sub">ROCK PAPER SCISSORS</div>

<div class="battle">
  <div class="hand" id="player-hand">🤔</div>
  <div class="vs">VS</div>
  <div class="hand" id="cpu-hand">🤔</div>
</div>

<div class="result-text" id="result"></div>

<div class="buttons">
  <button class="btn" data-choice="rock"    title="グー">✊</button>
  <button class="btn" data-choice="scissors" title="チョキ">✌️</button>
  <button class="btn" data-choice="paper"   title="パー">🖐</button>
</div>

<div class="score">
  <div class="score-item win-col">
    <div class="score-num" id="score-win">0</div>
    <div class="score-label">勝</div>
  </div>
  <div class="score-item draw-col">
    <div class="score-num" id="score-draw">0</div>
    <div class="score-label">引</div>
  </div>
  <div class="score-item lose-col">
    <div class="score-num" id="score-lose">0</div>
    <div class="score-label">負</div>
  </div>
</div>
<button class="reset-btn" id="reset">リセット</button>

<div class="ad">
  <!-- <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXX" data-ad-slot="XXXXXXXX" data-ad-format="auto"></ins> -->
</div>

<script>
  const CHOICES = ['rock', 'scissors', 'paper'];
  const EMOJI = { rock: '✊', scissors: '✌️', paper: '🖐' };
  const NAMES = { rock: 'グー', scissors: 'チョキ', paper: 'パー' };

  let stats = JSON.parse(localStorage.getItem('janken-stats') || '{"win":0,"lose":0,"draw":0}');

  const playerEl = document.getElementById('player-hand');
  const cpuEl    = document.getElementById('cpu-hand');
  const resultEl = document.getElementById('result');
  const winEl    = document.getElementById('score-win');
  const loseEl   = document.getElementById('score-lose');
  const drawEl   = document.getElementById('score-draw');

  function renderScore() {
    winEl.textContent  = stats.win;
    loseEl.textContent = stats.lose;
    drawEl.textContent = stats.draw;
  }
  renderScore();

  function judge(player, cpu) {
    if (player === cpu) return 'draw';
    if (
      (player === 'rock'     && cpu === 'scissors') ||
      (player === 'scissors' && cpu === 'paper')    ||
      (player === 'paper'    && cpu === 'rock')
    ) return 'win';
    return 'lose';
  }

  function play(choice) {
    const cpu = CHOICES[Math.floor(Math.random() * 3)];

    // shake animation
    playerEl.textContent = '✊';
    cpuEl.textContent    = '✊';
    playerEl.classList.remove('shake');
    cpuEl.classList.remove('shake');
    void playerEl.offsetWidth;
    playerEl.classList.add('shake');
    cpuEl.classList.add('shake');

    setTimeout(() => {
      playerEl.textContent = EMOJI[choice];
      cpuEl.textContent    = EMOJI[cpu];

      const outcome = judge(choice, cpu);
      resultEl.className = 'result-text ' + outcome;
      if (outcome === 'win') {
        resultEl.textContent = '🎉 あなたの勝ち！';
        stats.win++;
      } else if (outcome === 'lose') {
        resultEl.textContent = '😭 あなたの負け';
        stats.lose++;
      } else {
        resultEl.textContent = '🤝 あいこ';
        stats.draw++;
      }
      localStorage.setItem('janken-stats', JSON.stringify(stats));
      renderScore();
    }, 380);
  }

  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', () => play(btn.dataset.choice));
  });

  document.getElementById('reset').addEventListener('click', () => {
    if (confirm('通算成績をリセットしますか？')) {
      stats = { win: 0, lose: 0, draw: 0 };
      localStorage.setItem('janken-stats', JSON.stringify(stats));
      renderScore();
      playerEl.textContent = '🤔';
      cpuEl.textContent    = '🤔';
      resultEl.textContent = '';
      resultEl.className   = 'result-text';
    }
  });
</script>
</body>
</html>
