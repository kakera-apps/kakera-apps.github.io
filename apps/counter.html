<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ただ数える</title>
<!-- AdSense: <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXX" crossorigin="anonymous"></script> -->
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KEGXWEWWCG"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-KEGXWEWWCG');

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #0f0f0f;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
  }
  #count {
    font-size: 30vw;
    font-weight: 900;
    line-height: 1;
    transition: transform 0.05s;
  }
  #count.bump { transform: scale(1.08); }
  .label {
    font-size: 1rem;
    opacity: 0.4;
    margin-top: 8px;
    letter-spacing: 0.2em;
  }
  .buttons {
    display: flex;
    gap: 20px;
    margin-top: 48px;
  }
  button {
    border: none;
    border-radius: 50%;
    width: 80px;
    height: 80px;
    font-size: 2rem;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
  }
  button:active { transform: scale(0.92); }
  #btn-plus  { background: #fff; color: #000; }
  #btn-minus { background: #333; color: #fff; }
  #btn-reset {
    background: none;
    color: #555;
    font-size: 0.85rem;
    width: auto;
    height: auto;
    border-radius: 8px;
    padding: 8px 16px;
    margin-top: 24px;
    border: 1px solid #333;
  }
  /* AdSense slot */
  .ad { margin-top: 40px; min-height: 50px; width: 320px; }
</style>
</head>
<body>
<div id="count">0</div>
<div class="label">TAP TO COUNT</div>
<div class="buttons">
  <button id="btn-minus">−</button>
  <button id="btn-plus">＋</button>
</div>
<button id="btn-reset">リセット</button>
<div class="ad">
  <!-- <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXX" data-ad-slot="XXXXXXXX" data-ad-format="auto"></ins> -->
</div>

<script>
  let n = parseInt(localStorage.getItem('count') || '0');
  const el = document.getElementById('count');

  function update() {
    el.textContent = n;
    localStorage.setItem('count', n);
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }
  update();

  document.getElementById('btn-plus').addEventListener('click', () => { n++; update(); });
  document.getElementById('btn-minus').addEventListener('click', () => { n = Math.max(0, n - 1); update(); });
  document.getElementById('btn-reset').addEventListener('click', () => { if (confirm('リセットしますか？')) { n = 0; update(); } });
</script>
</body>
</html>
