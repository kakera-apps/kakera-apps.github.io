<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ジャスト10秒 対戦</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KEGXWEWWCG"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-KEGXWEWWCG');
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: -apple-system, sans-serif;
    background: #0f0f0f; color: #fff;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }

  /* ── セットアップ画面 ── */
  #setup {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px; background: #0f0f0f; z-index: 100;
  }
  #setup h1 { font-size: 1.6rem; font-weight: 900; }
  #setup p  { font-size: 0.9rem; opacity: 0.45; }
  .player-btns { display: flex; gap: 16px; }
  .player-btn {
    width: 88px; height: 88px; border-radius: 20px;
    border: 2px solid #333; background: #1a1a1a;
    color: #fff; font-size: 1.5rem; font-weight: 900;
    cursor: pointer; transition: transform 0.1s, background 0.1s;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
  }
  .player-btn span { font-size: 0.7rem; opacity: 0.5; font-weight: 400; }
  .player-btn:active { transform: scale(0.92); background: #2a2a2a; }
  .back-link { color: #555; font-size: 0.85rem; text-decoration: none; margin-top: 8px; }

  /* ── ゲームエリア ── */
  #game { width: 100vw; height: 100vh; display: none; position: relative; }
  #grid { width: 100%; height: 100%; display: grid; }

  /* ── プレイヤーゾーン ── */
  .zone {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    border: 3px solid #1e1e1e;
    transition: background 0.25s, border-color 0.15s;
    position: relative; overflow: hidden;
    touch-action: none;
  }
  .zone-label {
    font-size: 0.9rem; font-weight: 700;
    letter-spacing: 0.12em; opacity: 0.55;
  }
  .zone-status { font-size: 0.85rem; opacity: 0.4; }
  .zone-time {
    font-size: min(8vw, 2.4rem); font-weight: 700; line-height: 1;
    display: none;
  }
  .zone-diff {
    font-size: min(3.5vw, 0.88rem); opacity: 0.6;
    display: none; margin-top: 2px;
  }
  .zone-rank { font-size: min(14vw, 4.2rem); display: none; line-height: 1; margin-top: 4px; }

  .zone.ready   { border-color: var(--c); background: rgba(255,255,255,0.04); }
  .zone.running { border-color: var(--c); background: rgba(255,255,255,0.03); }
  .zone.stopped { border-color: var(--c); }
  .zone.timeout { opacity: 0.45; }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 0.9; }
  }
  .zone.running .zone-status { animation: pulse 1.4s ease-in-out infinite; }

  /* ── 中央オーバーレイ ── */
  #overlay {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(140px, 32vw); height: min(140px, 32vw);
    border-radius: 50%;
    background: #111; border: 3px solid #2a2a2a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 4px;
    z-index: 20; pointer-events: none;
    transition: background 0.2s, border-color 0.2s;
  }
  #overlay.go { background: #00c851; border-color: #00c851; }
  #ov-main { font-size: 2rem; font-weight: 900; line-height: 1.1; }
  #overlay.go #ov-main { font-size: 1.05rem; }
  #ov-sub  { font-size: 0.65rem; opacity: 0.7; }

  @keyframes popIn {
    0%   { transform: scale(0.4); opacity: 0; }
    70%  { transform: scale(1.12); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop-in { animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
</style>
</head>
<body>

<!-- セットアップ画面 -->
<div id="setup">
  <h1>ジャスト10秒 対戦</h1>
  <p>一つの画面を囲んでプレイ</p>
  <div class="player-btns">
    <button class="player-btn" onclick="init(2)">2P<span>左右</span></button>
    <button class="player-btn" onclick="init(3)">3P<span>3分割</span></button>
    <button class="player-btn" onclick="init(4)">4P<span>4分割</span></button>
  </div>
  <a class="back-link" href="../index.html">← 戻る</a>
</div>

<!-- ゲームエリア -->
<div id="game">
  <div id="grid"></div>
  <div id="overlay">
    <div id="ov-main">準備して</div>
    <div id="ov-sub"></div>
  </div>
</div>

<script>
const COLORS = ['#4fc3f7', '#ff8a65', '#00dc64', '#ce93d8'];
const PNAMES = ['P1', 'P2', 'P3', 'P4'];
const MEDALS = ['🥇', '🥈', '🥉', '4位'];
const TARGET = 10;

const PHASE = { READY: 0, COUNTDOWN: 1, RUNNING: 2, RESULT: 3 };
let phase, players, goTime, waitTimer, timeoutTimer, currentN;

const overlay = document.getElementById('overlay');
const ovMain  = document.getElementById('ov-main');
const ovSub   = document.getElementById('ov-sub');
const grid    = document.getElementById('grid');

function init(n) {
  currentN = n;
  clearTimeout(waitTimer);
  clearTimeout(timeoutTimer);
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';

  grid.style.gridTemplateColumns = '1fr 1fr';
  grid.style.gridTemplateRows   = n === 2 ? '1fr' : '1fr 1fr';
  grid.innerHTML = '';

  players = Array.from({length: n}, (_, i) => ({
    i, name: PNAMES[i], color: COLORS[i],
    ready: false, elapsed: null, el: null,
  }));

  players.forEach(p => {
    const z = document.createElement('div');
    z.className = 'zone';
    z.style.setProperty('--c', p.color);
    if (n === 3 && p.i === 2) z.style.gridColumn = '1 / -1';

    z.innerHTML = `
      <div class="zone-label" style="color:${p.color}">${p.name}</div>
      <div class="zone-status" id="st${p.i}">タップして準備</div>
      <div class="zone-time"   id="tm${p.i}"></div>
      <div class="zone-diff"   id="df${p.i}"></div>
      <div class="zone-rank"   id="rk${p.i}"></div>
    `;
    z.addEventListener('touchstart', e => { e.preventDefault(); tap(p.i); }, {passive: false});
    z.addEventListener('click', () => tap(p.i));
    p.el = z;
    grid.appendChild(z);
  });

  phase = PHASE.READY;
  overlay.style.display = '';
  overlay.className = '';
  setOverlay('準備して', '全員タップで開始');
}

function tap(i) {
  const p = players[i];

  if (phase === PHASE.READY) {
    if (p.ready) return;
    p.ready = true;
    p.el.classList.add('ready');
    document.getElementById(`st${i}`).textContent = '準備OK ✓';
    const readyN = players.filter(x => x.ready).length;
    setOverlay(`${readyN}/${currentN}`, '準備完了');
    if (readyN === currentN) startCountdown();
    return;
  }

  if (phase === PHASE.COUNTDOWN) return;

  if (phase === PHASE.RUNNING) {
    if (p.elapsed !== null) return;
    p.elapsed = (performance.now() - goTime) / 1000;
    p.el.classList.remove('running');
    p.el.classList.add('stopped');
    showPlayerTime(p.i, p.elapsed);
    if (players.every(x => x.elapsed !== null)) {
      clearTimeout(timeoutTimer);
      showResults();
    }
    return;
  }

  if (phase === PHASE.RESULT) {
    init(currentN);
    return;
  }
}

function startCountdown() {
  phase = PHASE.COUNTDOWN;
  overlay.style.display = '';
  overlay.className = '';

  const counts = ['3', '2', '1'];
  let idx = 0;
  setOverlay(counts[idx], '');

  function tick() {
    idx++;
    if (idx < counts.length) {
      setOverlay(counts[idx], '');
      waitTimer = setTimeout(tick, 1000);
    } else {
      overlay.className = 'go';
      setOverlay('スタート！', '');
      goTime = performance.now();
      phase = PHASE.RUNNING;
      players.forEach(p => {
        p.el.classList.remove('ready');
        p.el.classList.add('running');
        document.getElementById(`st${p.i}`).textContent = '計測中...';
      });
      waitTimer = setTimeout(() => { overlay.style.display = 'none'; }, 700);
      timeoutTimer = setTimeout(handleTimeout, 20000);
    }
  }
  waitTimer = setTimeout(tick, 1000);
}

function handleTimeout() {
  if (phase !== PHASE.RUNNING) return;
  players.forEach(p => {
    if (p.elapsed === null) {
      p.elapsed = (performance.now() - goTime) / 1000;
      p.el.classList.remove('running');
      p.el.classList.add('timeout');
      showPlayerTime(p.i, p.elapsed);
    }
  });
  showResults();
}

function showPlayerTime(i, elapsed) {
  const diff = Math.abs(elapsed - TARGET);
  const sign = elapsed >= TARGET ? '+' : '-';
  const tmEl = document.getElementById(`tm${i}`);
  const dfEl = document.getElementById(`df${i}`);

  document.getElementById(`st${i}`).style.display = 'none';
  tmEl.style.display = 'block';
  dfEl.style.display = 'block';
  tmEl.textContent = elapsed.toFixed(3) + '秒';
  dfEl.textContent = `誤差 ${sign}${diff.toFixed(3)}秒`;

  let color;
  if (diff <= 0.1)      color = '#FFD700';
  else if (diff <= 0.5) color = '#00dc64';
  else if (diff <= 1.0) color = '#4fc3f7';
  else                  color = '#fff';
  tmEl.style.color = color;

  tmEl.classList.remove('pop-in');
  void tmEl.offsetWidth;
  tmEl.classList.add('pop-in');
}

function showResults() {
  phase = PHASE.RESULT;
  overlay.style.display = 'none';

  const sorted = [...players].sort((a, b) =>
    Math.abs(a.elapsed - TARGET) - Math.abs(b.elapsed - TARGET)
  );

  sorted.forEach((p, rank) => {
    const rkEl = document.getElementById(`rk${p.i}`);
    rkEl.textContent = MEDALS[rank];
    rkEl.style.display = 'block';
    rkEl.classList.remove('pop-in');
    void rkEl.offsetWidth;
    rkEl.classList.add('pop-in');
  });
}

function setOverlay(main, sub) {
  ovMain.textContent = main;
  ovSub.textContent  = sub;
}
</script>
</body>
</html>
