<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: 20px;
  }
  #back-btn {
    position: fixed; top: 12px; left: 12px;
    color: rgba(255,255,255,0.4); text-decoration: none;
    font-size: 0.85rem; z-index: 100; padding: 6px 10px;
  }
  #back-btn:hover { color: #fff; }

  /* IDLE */
  #state-idle { display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
  #state-idle h1 { font-size: 1.8rem; font-weight: 900; }
  #state-idle p { font-size: 0.9rem; opacity: 0.5; line-height: 1.6; max-width: 280px; }
  .best-label { font-size: 0.8rem; opacity: 0.35; }
  .start-btn {
    background: #fff; color: #000; border: none; border-radius: 99px;
    padding: 16px 48px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 8px;
  }
  .start-btn:active { transform: scale(0.96); }

  /* PLAYING */
  #state-playing { display: none; flex-direction: column; align-items: center; gap: 24px; }
  #round-info { font-size: 0.9rem; opacity: 0.5; }

  #metronome-circle {
    width: min(64vw, 240px);
    height: min(64vw, 240px);
    border-radius: 50%;
    background: #1a1a1a;
    border: 3px solid #333;
    transition: background 0.08s, box-shadow 0.08s, transform 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    opacity: 0.7;
    cursor: default;
  }
  #metronome-circle.lit {
    background: #ffd700;
    box-shadow: 0 0 60px rgba(255, 215, 0, 0.6);
    transform: scale(1.06);
    opacity: 1;
    border-color: #ffd700;
  }
  #metronome-circle.tap-ready {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.7);
    opacity: 1;
    cursor: pointer;
    animation: tapPulse 0.5s ease-in-out infinite;
  }
  @keyframes tapPulse {
    0%,100% { box-shadow: 0 0 20px rgba(255,255,255,0.2); transform: scale(1); }
    50%      { box-shadow: 0 0 60px rgba(255,255,255,0.5); transform: scale(1.06); }
  }

  #phase-label {
    font-size: 1.1rem;
    font-weight: 700;
    min-height: 1.6em;
    text-align: center;
  }
  #fail-threshold { font-size: 0.8rem; opacity: 0.35; }

  /* RESULT */
  #state-result { display: none; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
  #result-rounds { font-size: clamp(4rem, 20vw, 7rem); font-weight: 900; line-height: 1; color: #ffd700; }
  #result-rank { font-size: 2rem; }
  #result-best { font-size: 0.8rem; opacity: 0.35; }

  .share-btn {
    background: #1d9bf0; color: #fff; border: none; border-radius: 99px;
    padding: 14px 40px; font-size: 1rem; font-weight: 700; cursor: pointer;
    margin-top: 12px; letter-spacing: 0.05em;
    box-shadow: 0 4px 20px rgba(29,155,240,0.4);
  }
  .share-btn:active { opacity: 0.8; transform: scale(0.96); }
  .x-btn { background: #000; color: #fff; border: none; border-radius: 99px; padding: 14px 28px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .x-btn:active { opacity: 0.7; transform: scale(0.96); }
  .retry-btn {
    background: #222; color: #fff; border: none; border-radius: 99px;
    padding: 12px 36px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
  }
  .retry-btn:active { transform: scale(0.96); }

  @keyframes popIn {
    0%   { transform: scale(0.4); opacity: 0; }
    70%  { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop-in { animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
</style>
</head>
<body>

<a href="../index.html" id="back-btn">← 戻る</a>

<div id="state-idle">
  <h1>🎵 リズム感テスト</h1>
  <p>円が4回光ります。<br>5回目のタイミングで同じ円をタップ。<br>150ms以内でクリア。何ラウンド連続で続けられる？</p>
  <p class="best-label" id="idle-best"></p>
  <button class="start-btn" onclick="startGame()">スタート</button>
</div>

<div id="state-playing">
  <div id="round-info">ラウンド 1</div>
  <div id="metronome-circle"></div>
  <div id="phase-label"></div>
  <div id="fail-threshold">150ms以内でクリア</div>
</div>

<div id="state-result">
  <div style="font-size:1rem;opacity:0.5;margin-bottom:4px;">生存ラウンド数</div>
  <div id="result-rounds">0</div>
  <div style="font-size:1rem;opacity:0.5;">ラウンド</div>
  <div id="result-rank"></div>
  <div id="result-best"></div>
  <button class="share-btn" onclick="doShare()">シェアする 🔗</button>
  <button class="x-btn" onclick="xShare()">X でシェア</button>
  <button class="retry-btn" onclick="showIdle()" style="margin-top:8px;">もう一度</button>
</div>

<script>
const FAIL_MS = 150;
const FLASH_INTERVAL = 1000;
const FLASH_DUR = 200;

let round = 0;
let survived = 0;
let flashCount = 0;
let lastFlashTime = 0;
let idealTapTime = 0;
let waitingForTap = false;
let timers = [];

function clearAllTimers() { timers.forEach(clearTimeout); timers = []; }

const circle = document.getElementById('metronome-circle');

circle.addEventListener('click', onCircleTap);
circle.addEventListener('touchstart', e => { e.preventDefault(); onCircleTap(); }, { passive: false });

function showIdle() {
  document.getElementById('state-idle').style.display = 'flex';
  document.getElementById('state-playing').style.display = 'none';
  document.getElementById('state-result').style.display = 'none';
  clearAllTimers();
  const best = parseInt(localStorage.getItem('rhythm-best') || '0');
  document.getElementById('idle-best').textContent = best ? `自己ベスト: ${best}ラウンド` : '';
}

function startGame() {
  round = 0; survived = 0;
  document.getElementById('state-idle').style.display = 'none';
  document.getElementById('state-playing').style.display = 'flex';
  document.getElementById('state-result').style.display = 'none';
  startRound();
}

function startRound() {
  clearAllTimers();
  flashCount = 0;
  waitingForTap = false;
  round++;
  document.getElementById('round-info').textContent = `ラウンド ${round}`;
  document.getElementById('phase-label').textContent = '光るのを見て...';

  circle.className = '';
  circle.textContent = '';
  circle.style.pointerEvents = 'none';

  scheduleFlash();
}

function scheduleFlash() {
  timers.push(setTimeout(doFlash, FLASH_INTERVAL));
}

function doFlash() {
  flashCount++;
  circle.classList.add('lit');
  lastFlashTime = performance.now();

  timers.push(setTimeout(() => circle.classList.remove('lit'), FLASH_DUR));

  if (flashCount < 4) {
    scheduleFlash();
  } else {
    idealTapTime = lastFlashTime + FLASH_INTERVAL;

    // show tap phase 300ms before ideal time
    timers.push(setTimeout(() => {
      waitingForTap = true;
      document.getElementById('phase-label').textContent = '今！タップ！';
      circle.classList.add('tap-ready');
      circle.textContent = '👆';
      circle.style.pointerEvents = 'auto';
    }, FLASH_INTERVAL - 300));

    // auto-fail 600ms after ideal time
    timers.push(setTimeout(() => {
      if (waitingForTap) { waitingForTap = false; processTap(true); }
    }, FLASH_INTERVAL + 600));
  }
}

function onCircleTap() {
  if (!waitingForTap) return;
  waitingForTap = false;
  clearAllTimers();
  processTap(false);
}

function processTap(isAutoFail) {
  circle.classList.remove('tap-ready');
  circle.style.pointerEvents = 'none';

  const diff = isAutoFail ? 9999 : Math.abs(Math.round(performance.now() - idealTapTime));
  const success = diff <= FAIL_MS;

  if (success) {
    survived++;
    circle.textContent = `✓`;
    document.getElementById('phase-label').textContent = `ズレ: ${diff}ms — クリア！`;
    timers.push(setTimeout(() => {
      circle.textContent = '';
      startRound();
    }, 900));
  } else {
    circle.textContent = `✗`;
    document.getElementById('phase-label').textContent = isAutoFail
      ? 'タイムオーバー！'
      : `ズレ: ${diff}ms — アウト！`;
    timers.push(setTimeout(showResult, 1200));
  }
}

function rank(rounds) {
  if (rounds >= 20) return '🎵 神業';
  if (rounds >= 10) return '⭐ すごい';
  if (rounds >= 5)  return '👍 良い';
  if (rounds >= 1)  return '😅 練習して';
  return '💀 即リタイア';
}

function showResult() {
  document.getElementById('state-playing').style.display = 'none';
  document.getElementById('state-result').style.display = 'flex';

  const roundsEl = document.getElementById('result-rounds');
  roundsEl.textContent = survived;
  document.getElementById('result-rank').textContent = rank(survived);

  const best = parseInt(localStorage.getItem('rhythm-best') || '0');
  if (survived > best) {
    localStorage.setItem('rhythm-best', survived);
    document.getElementById('result-best').textContent = '🎉 新記録！';
  } else {
    document.getElementById('result-best').textContent = best ? `自己ベスト: ${best}ラウンド` : '';
  }

  roundsEl.classList.remove('pop-in');
  void roundsEl.offsetWidth;
  roundsEl.classList.add('pop-in');
}

function showToast(m) {
  const t = document.createElement('div');
  t.textContent = m;
  Object.assign(t.style, {
    position:'fixed', bottom:'80px', left:'50%', transform:'translateX(-50%)',
    background:'#fff', color:'#000', padding:'10px 20px', borderRadius:'99px',
    fontSize:'0.9rem', fontWeight:'700', zIndex:'999', pointerEvents:'none', whiteSpace:'nowrap'
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function doShare() {
  const rounds = document.getElementById('result-rounds').textContent;
  const r = document.getElementById('result-rank').textContent;
  const text = `リズム感テスト ${rounds}ラウンド生存 ${r}\nあなたは？ → kakera-apps.github.io/apps/rhythm.html\n#リズム感テスト #kakera_app #暇つぶし`;
  if (navigator.share) { navigator.share({ text }); }
  else { navigator.clipboard.writeText(text).then(() => showToast('コピーしました！')); }
}

showIdle();
function xShare(){const rounds=document.getElementById('result-rounds').textContent;const r=document.getElementById('result-rank').textContent;window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(`リズム感テスト ${rounds}ラウンド生存 ${r}\nあなたは？ → kakera-apps.github.io/apps/rhythm.html\n#リズム感テスト #kakera_app #暇つぶし`),'_blank');}
</script>
