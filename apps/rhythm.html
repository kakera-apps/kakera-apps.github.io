<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リズム感テスト</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: 20px;
  }
  #back-btn {
    position: fixed; top: 12px; left: 12px;
    color: rgba(255,255,255,0.4); text-decoration: none;
    font-size: 0.85rem; z-index: 100; padding: 6px 10px;
  }
  #back-btn:hover { color: #fff; }

  /* IDLE */
  #state-idle { display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
  #state-idle h1 { font-size: 1.8rem; font-weight: 900; }
  #state-idle p { font-size: 0.9rem; opacity: 0.5; line-height: 1.6; max-width: 280px; }
  .best-label { font-size: 0.8rem; opacity: 0.35; }
  .start-btn {
    background: #fff; color: #000; border: none; border-radius: 99px;
    padding: 16px 48px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 8px;
  }
  .start-btn:active { transform: scale(0.96); }

  /* PLAYING */
  #state-playing { display: none; flex-direction: column; align-items: center; gap: 24px; }
  #round-info { font-size: 0.9rem; opacity: 0.5; }

  #metronome-circle {
    width: min(64vw, 240px);
    height: min(64vw, 240px);
    border-radius: 50%;
    background: #1a1a1a;
    border: 3px solid #333;
    transition: background 0.08s, box-shadow 0.08s, transform 0.08s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    opacity: 0.7;
  }
  #metronome-circle.lit {
    background: #ffd700;
    box-shadow: 0 0 60px rgba(255, 215, 0, 0.6);
    transform: scale(1.06);
    opacity: 1;
  }
  #metronome-circle.tap-active {
    background: #4fc3f7;
    box-shadow: 0 0 60px rgba(79, 195, 247, 0.6);
    transform: scale(1.06);
    opacity: 1;
  }

  #phase-label {
    font-size: 1.2rem;
    font-weight: 700;
    min-height: 1.6em;
    text-align: center;
  }
  #tap-hint {
    font-size: 0.9rem;
    opacity: 0.4;
    text-align: center;
  }
  .tap-btn {
    width: min(64vw, 240px);
    height: min(64vw, 240px);
    border-radius: 50%;
    background: linear-gradient(135deg, #4fc3f7, #1d9bf0);
    border: none;
    cursor: pointer;
    font-size: 1.4rem;
    font-weight: 900;
    color: #fff;
    box-shadow: 0 0 40px rgba(79,195,247,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }
  .tap-btn:active { transform: scale(0.95); }

  /* RESULT */
  #state-result { display: none; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
  #result-avg { font-size: clamp(4rem, 20vw, 7rem); font-weight: 900; line-height: 1; color: #ffd700; }
  #result-unit { font-size: 1rem; opacity: 0.5; }
  #result-rank { font-size: 2rem; }
  #result-list { font-size: 0.85rem; opacity: 0.4; line-height: 1.9; margin-top: 4px; }
  #result-best { font-size: 0.8rem; opacity: 0.35; }

  .share-btn {
    background: #1d9bf0; color: #fff; border: none; border-radius: 99px;
    padding: 14px 40px; font-size: 1rem; font-weight: 700; cursor: pointer;
    margin-top: 12px; letter-spacing: 0.05em;
    box-shadow: 0 4px 20px rgba(29,155,240,0.4);
  }
  .share-btn:active { opacity: 0.8; transform: scale(0.96); }
  .retry-btn {
    background: #222; color: #fff; border: none; border-radius: 99px;
    padding: 12px 36px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
  }
  .retry-btn:active { transform: scale(0.96); }

  @keyframes popIn {
    0%   { transform: scale(0.4); opacity: 0; }
    70%  { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop-in { animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
</style>
</head>
<body>

<a href="../index.html" id="back-btn">← 戻る</a>

<div id="state-idle">
  <h1>🎵 リズム感テスト</h1>
  <p>円が4回光ります。<br>5回目のタイミングで自分でタップ。<br>5ラウンドの平均ズレを計測します。</p>
  <p class="best-label" id="idle-best"></p>
  <button class="start-btn" onclick="startGame()">スタート</button>
</div>

<div id="state-playing">
  <div id="round-info">ラウンド 1 / 5</div>
  <div id="metronome-circle" id="circle">待機中</div>
  <button class="tap-btn" id="tap-btn" onclick="onTap()">
    <span style="font-size:2rem">👆</span>
    <span>タップ！</span>
  </button>
  <div id="phase-label"></div>
  <div id="tap-hint"></div>
</div>

<div id="state-result">
  <div style="font-size:1rem;opacity:0.5;margin-bottom:4px;">5ラウンド平均ズレ</div>
  <div id="result-avg">0</div>
  <div id="result-unit">ms</div>
  <div id="result-rank"></div>
  <div id="result-list"></div>
  <div id="result-best"></div>
  <button class="share-btn" onclick="doShare()">シェアする 🔗</button>
  <button class="retry-btn" onclick="showIdle()" style="margin-top:8px;">もう一度</button>
</div>

<script>
const TOTAL_ROUNDS = 5;
const FLASH_INTERVAL = 1000;
const FLASH_DUR = 200;

let round = 0;
let diffs = [];
let flashCount = 0;
let lastFlashTime = 0;
let idealTapTime = 0;
let waitingForTap = false;
let timers = [];

function clearAllTimers() { timers.forEach(clearTimeout); timers = []; }

function showIdle() {
  document.getElementById('state-idle').style.display = 'flex';
  document.getElementById('state-playing').style.display = 'none';
  document.getElementById('state-result').style.display = 'none';
  const best = parseInt(localStorage.getItem('rhythm-best') || '9999');
  document.getElementById('idle-best').textContent = best < 9999 ? `自己ベスト: 平均${best}ms` : '';
}

function startGame() {
  round = 0; diffs = [];
  document.getElementById('state-idle').style.display = 'none';
  document.getElementById('state-playing').style.display = 'flex';
  document.getElementById('state-result').style.display = 'none';
  startRound();
}

function startRound() {
  clearAllTimers();
  flashCount = 0;
  waitingForTap = false;
  round++;
  document.getElementById('round-info').textContent = `ラウンド ${round} / ${TOTAL_ROUNDS}`;
  document.getElementById('phase-label').textContent = '光るのを見て...';
  document.getElementById('tap-hint').textContent = '';

  const circle = document.getElementById('metronome-circle');
  const tapBtn = document.getElementById('tap-btn');
  circle.style.display = 'flex';
  tapBtn.style.display = 'none';

  scheduleFlash();
}

function scheduleFlash() {
  const t = setTimeout(() => {
    doFlash();
  }, FLASH_INTERVAL);
  timers.push(t);
}

function doFlash() {
  flashCount++;
  const circle = document.getElementById('metronome-circle');
  circle.classList.add('lit');
  lastFlashTime = performance.now();

  const t1 = setTimeout(() => circle.classList.remove('lit'), FLASH_DUR);
  timers.push(t1);

  if (flashCount < 4) {
    scheduleFlash();
  } else {
    // after 4th flash, next 1000ms = ideal tap time
    idealTapTime = lastFlashTime + FLASH_INTERVAL;
    const t2 = setTimeout(() => {
      waitingForTap = true;
      document.getElementById('phase-label').textContent = '5回目のタイミングで！';
      document.getElementById('tap-hint').textContent = '↓ 今すぐタップ！';
      const circle = document.getElementById('metronome-circle');
      circle.style.display = 'none';
      const tapBtn = document.getElementById('tap-btn');
      tapBtn.style.display = 'flex';
    }, FLASH_INTERVAL - 300);
    timers.push(t2);
  }
}

function onTap() {
  if (!waitingForTap) return;
  waitingForTap = false;
  clearAllTimers();

  const now = performance.now();
  const diff = Math.abs(Math.round(now - idealTapTime));
  diffs.push(diff);

  document.getElementById('phase-label').textContent = `ズレ: ${diff}ms`;
  document.getElementById('tap-hint').textContent = '';

  const tapBtn = document.getElementById('tap-btn');
  tapBtn.style.display = 'none';
  const circle = document.getElementById('metronome-circle');
  circle.style.display = 'flex';
  circle.textContent = `${diff}ms`;

  if (round < TOTAL_ROUNDS) {
    const t = setTimeout(() => {
      circle.textContent = '待機中';
      startRound();
    }, 1200);
    timers.push(t);
  } else {
    const t = setTimeout(showResult, 1200);
    timers.push(t);
  }
}

function rank(avg) {
  if (avg <= 30)  return '🎵 神業';
  if (avg <= 80)  return '⭐ すごい';
  if (avg <= 150) return '👍 良い';
  return '😅 練習して';
}

function showResult() {
  document.getElementById('state-playing').style.display = 'none';
  document.getElementById('state-result').style.display = 'flex';

  const avg = Math.round(diffs.reduce((a,b)=>a+b,0) / diffs.length);
  const r = rank(avg);

  const avgEl = document.getElementById('result-avg');
  avgEl.textContent = avg;
  document.getElementById('result-rank').textContent = r;

  const listLines = diffs.map((d, i) => `ラウンド${i+1}: ${d}ms`).join('\n');
  document.getElementById('result-list').textContent = listLines;

  const best = parseInt(localStorage.getItem('rhythm-best') || '9999');
  if (avg < best) {
    localStorage.setItem('rhythm-best', avg);
    document.getElementById('result-best').textContent = '🎉 新記録！';
  } else {
    document.getElementById('result-best').textContent = `自己ベスト: ${best}ms`;
  }

  avgEl.classList.remove('pop-in');
  void avgEl.offsetWidth;
  avgEl.classList.add('pop-in');
}

function showToast(m) {
  const t = document.createElement('div');
  t.textContent = m;
  Object.assign(t.style, {
    position:'fixed', bottom:'80px', left:'50%', transform:'translateX(-50%)',
    background:'#fff', color:'#000', padding:'10px 20px', borderRadius:'99px',
    fontSize:'0.9rem', fontWeight:'700', zIndex:'999', pointerEvents:'none', whiteSpace:'nowrap'
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function doShare() {
  const avg = document.getElementById('result-avg').textContent;
  const r   = document.getElementById('result-rank').textContent;
  const text = `リズム感テスト 平均ズレ${avg}ms ${r}\nあなたは？ → kakera-apps.github.io/apps/rhythm.html\n#リズム感テスト #kakera_app #暇つぶし`;
  if (navigator.share) { navigator.share({ text }); }
  else { navigator.clipboard.writeText(text).then(() => showToast('コピーしました！')); }
}

showIdle();
</script>
</body>
</html>
