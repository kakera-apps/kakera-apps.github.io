<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="数字順タップ | ミニゲーム集">
<meta property="og:description" content="1〜25をランダム配置。順番にタップする速さを競え。">
<meta property="og:url" content="https://kakera-apps.github.io/apps/number-tap.html">
<meta property="og:image" content="https://kakera-apps.github.io/ogp.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="数字順タップ | ミニゲーム集">
<meta name="twitter:description" content="1〜25をランダム配置。順番にタップする速さを競え。">
<title>数字順タップ</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KEGXWEWWCG"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-KEGXWEWWCG');

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: 20px;
  }
  #back-btn {
    position: fixed; top: 12px; left: 12px;
    color: rgba(255,255,255,0.4); text-decoration: none;
    font-size: 0.85rem; z-index: 100; padding: 6px 10px;
  }
  #back-btn:hover { color: #fff; }

  /* IDLE */
  #state-idle { display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
  #state-idle h1 { font-size: 1.8rem; font-weight: 900; }
  #state-idle p { font-size: 0.9rem; opacity: 0.5; line-height: 1.6; max-width: 280px; }
  .best-label { font-size: 0.8rem; opacity: 0.35; }
  .start-btn {
    background: #fff; color: #000; border: none; border-radius: 99px;
    padding: 16px 48px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 8px;
  }
  .start-btn:active { transform: scale(0.96); }

  /* PLAYING */
  #state-playing { display: none; flex-direction: column; align-items: center; gap: 16px; width: 100%; }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 340px;
  }
  #hud-timer { font-size: 2rem; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  #hud-next { font-size: 0.9rem; opacity: 0.6; }
  #hud-next span { font-size: 1.4rem; font-weight: 900; color: #ffd700; opacity: 1; }

  #grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 340px;
  }
  .cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    font-size: clamp(1rem, 5vw, 1.3rem);
    font-weight: 700;
    cursor: pointer;
    background: #1e1e1e;
    border: 2px solid #2a2a2a;
    transition: background 0.1s, border-color 0.1s, transform 0.08s;
  }
  .cell:active { transform: scale(0.9); }
  .cell.next {
    background: #2a2a1a;
    border-color: #ffd700;
    color: #ffd700;
    box-shadow: 0 0 16px rgba(255, 215, 0, 0.3);
  }
  .cell.done {
    background: #0f2a0f;
    border-color: #1a4a1a;
    color: rgba(255,255,255,0.15);
  }
  .cell.wrong {
    animation: shake 0.3s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* RESULT */
  #state-result { display: none; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
  #result-time { font-size: clamp(3.5rem, 18vw, 7rem); font-weight: 900; line-height: 1; color: #ffd700; }
  #result-label { font-size: 1rem; opacity: 0.5; }
  #result-rank { font-size: 2rem; }
  #result-best { font-size: 0.85rem; opacity: 0.35; }

  .share-btn {
    background: #1d9bf0; color: #fff; border: none; border-radius: 99px;
    padding: 14px 40px; font-size: 1rem; font-weight: 700; cursor: pointer;
    margin-top: 12px; letter-spacing: 0.05em;
    box-shadow: 0 4px 20px rgba(29,155,240,0.4);
  }
  .share-btn:active { opacity: 0.8; transform: scale(0.96); }
  .x-btn { background: #000; color: #fff; border: none; border-radius: 99px; padding: 14px 28px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .x-btn:active { opacity: 0.7; transform: scale(0.96); }
  .retry-btn {
    background: #222; color: #fff; border: none; border-radius: 99px;
    padding: 12px 36px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
  }
  .retry-btn:active { transform: scale(0.96); }

  @keyframes popIn {
    0%   { transform: scale(0.4); opacity: 0; }
    70%  { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop-in { animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
</style>
</head>
<body>

<a href="../index.html" id="back-btn">↑ TOP</a>

<div id="state-idle">
  <h1>🔢 数字順タップ</h1>
  <p>1〜25がバラバラに並んでいる。<br>順番にタップして全部消すまでの<br>タイムを競え。</p>
  <p class="best-label" id="idle-best"></p>
  <button class="start-btn" onclick="startGame()">スタート</button>
</div>

<div id="state-playing">
  <div id="hud">
    <div id="hud-timer">0.00</div>
    <div id="hud-next">次: <span id="hud-next-num">1</span></div>
  </div>
  <div id="grid"></div>
</div>

<div id="state-result">
  <div style="font-size:1rem;opacity:0.5;margin-bottom:4px;">クリアタイム</div>
  <div id="result-time">0.00</div>
  <div id="result-label">秒</div>
  <div id="result-rank"></div>
  <div id="result-best"></div>
  <button class="share-btn" onclick="doShare()">シェアする 🔗</button>
  <button class="x-btn" onclick="xShare()">X でシェア</button>
  <button class="retry-btn" onclick="showIdle()" style="margin-top:8px;">もう一度</button>
</div>

<script>
let nextNum = 1;
let startTime = 0;
let timerInterval = null;
let finalTime = 0;

function showIdle() {
  document.getElementById('state-idle').style.display = 'flex';
  document.getElementById('state-playing').style.display = 'none';
  document.getElementById('state-result').style.display = 'none';
  clearInterval(timerInterval);
  const best = parseFloat(localStorage.getItem('numbertap-best') || '0');
  document.getElementById('idle-best').textContent = best ? `自己ベスト: ${best.toFixed(2)}秒` : '';
}

function startGame() {
  nextNum = 1;
  document.getElementById('state-idle').style.display = 'none';
  document.getElementById('state-playing').style.display = 'flex';
  document.getElementById('state-result').style.display = 'none';
  document.getElementById('hud-next-num').textContent = '1';

  buildGrid();

  document.getElementById('hud-timer').textContent = '0.00';
  startTime = performance.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = (performance.now() - startTime) / 1000;
    document.getElementById('hud-timer').textContent = elapsed.toFixed(2);
  }, 50);
}

function buildGrid() {
  const nums = Array.from({ length: 25 }, (_, i) => i + 1);
  for (let i = nums.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [nums[i], nums[j]] = [nums[j], nums[i]];
  }

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  nums.forEach(n => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (n === 1 ? ' next' : '');
    cell.textContent = n;
    cell.dataset.num = n;
    cell.addEventListener('click', () => onTap(cell, n));
    cell.addEventListener('touchstart', e => { e.preventDefault(); onTap(cell, n); }, { passive: false });
    grid.appendChild(cell);
  });
}

function onTap(cell, n) {
  if (n !== nextNum) {
    cell.classList.remove('wrong');
    void cell.offsetWidth;
    cell.classList.add('wrong');
    return;
  }

  cell.classList.remove('next', 'wrong');
  cell.classList.add('done');
  nextNum++;

  if (nextNum > 25) {
    clearInterval(timerInterval);
    finalTime = (performance.now() - startTime) / 1000;
    document.getElementById('hud-timer').textContent = finalTime.toFixed(2);
    setTimeout(showResult, 300);
  } else {
    document.getElementById('hud-next-num').textContent = nextNum;
    const nextCell = [...document.querySelectorAll('.cell')].find(c => parseInt(c.dataset.num) === nextNum);
    if (nextCell) nextCell.classList.add('next');
  }
}

function rank(t) {
  if (t < 15) return '🏆 超人';
  if (t < 20) return '⚡ すごい';
  if (t < 30) return '👍 良い';
  if (t < 45) return '😅 練習して';
  return '🐢 まだまだ';
}

function showResult() {
  document.getElementById('state-playing').style.display = 'none';
  document.getElementById('state-result').style.display = 'flex';

  const timeEl = document.getElementById('result-time');
  timeEl.textContent = finalTime.toFixed(2);
  document.getElementById('result-rank').textContent = rank(finalTime);

  const best = parseFloat(localStorage.getItem('numbertap-best') || '0');
  if (!best || finalTime < best) {
    localStorage.setItem('numbertap-best', finalTime.toFixed(2));
    document.getElementById('result-best').textContent = '🎉 新記録！';
  } else {
    document.getElementById('result-best').textContent = `自己ベスト: ${best.toFixed(2)}秒`;
  }

  timeEl.classList.remove('pop-in');
  void timeEl.offsetWidth;
  timeEl.classList.add('pop-in');
}

function showToast(m) {
  const t = document.createElement('div');
  t.textContent = m;
  Object.assign(t.style, {
    position: 'fixed', bottom: '80px', left: '50%', transform: 'translateX(-50%)',
    background: '#fff', color: '#000', padding: '10px 20px', borderRadius: '99px',
    fontSize: '0.9rem', fontWeight: '700', zIndex: '999', pointerEvents: 'none', whiteSpace: 'nowrap'
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function doShare() {
  const text = `数字順タップ ${finalTime.toFixed(2)}秒 ${rank(finalTime)}\nあなたは？ → kakera-apps.github.io/apps/number-tap.html\n#数字順タップ #kakera_app #暇つぶし`;
  if (navigator.share) { navigator.share({ text }); }
  else { navigator.clipboard.writeText(text).then(() => showToast('コピーしました！')); }
}

function xShare() {
  const text = `数字順タップ ${finalTime.toFixed(2)}秒 ${rank(finalTime)}\nあなたは？ → kakera-apps.github.io/apps/number-tap.html\n#数字順タップ #kakera_app #暇つぶし`;
  window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
}

showIdle();
</script>
</body>
</html>
